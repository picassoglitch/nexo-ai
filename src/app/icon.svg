<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="32" height="32">
  <!-- Dark rounded background so the mark reads at small sizes against any browser chrome -->
  <rect width="200" height="200" rx="40" fill="#06070b"/>
  <!-- Nexo "N" — acid-green stroked path (copy-verbatim from FusionMark) -->
  <path
    d="M44,150 L44,50 L66,50 L122,118 L122,50 L156,50 L156,150 L134,150 L78,82 L78,150 Z"
    fill="none"
    stroke="#9eea3a"
    stroke-width="10"
    stroke-linejoin="round"
  />
  <!-- 4 corner nodes (acid) + 2 inner nodes (cyan). At 32px these read as subtle dots. -->
  <g fill="#9eea3a">
    <circle cx="44" cy="50" r="8"/>
    <circle cx="156" cy="50" r="8"/>
    <circle cx="44" cy="150" r="8"/>
    <circle cx="156" cy="150" r="8"/>
  </g>
  <g fill="#42d9e8">
    <circle cx="122" cy="84" r="7"/>
    <circle cx="78" cy="116" r="7"/>
  </g>
</svg>
